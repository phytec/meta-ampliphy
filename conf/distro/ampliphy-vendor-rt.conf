require ampliphy-vendor.conf

DISTRO = "ampliphy-vendor-rt"
DISTRO_NAME = "ampliPHY Vendor PREEMPT-RT (Phytec Vendor PREEMPT-RT Distribution)"

DISTRO_FEATURES += "preempt-rt"

# Features enabled by virtualization can have potential negative impact on RT latencies.
DISTRO_FEATURES:remove:k3 = "virtualization"
